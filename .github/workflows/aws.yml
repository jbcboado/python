name: Deploy to EC2
on:
  push:
    branches: [ master ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/PythonPl || git clone https://github.com/jbcboado/python /home/ec2-user/PythonPl
            cd /home/ec2-user/PythonPl
            git pull origin master
            pip install -r requirements.txt
            python3 helloJames.py
            # Restart your app (e.g., using systemd or pm2)
            sudo systemctl restart PythonPl.service